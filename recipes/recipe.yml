# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: roseite
description: RoseiteOS - A completely hermetic, terminal-free, secure study system.
base-image: ghcr.io/ublue-os/onyx-main
image-version: 43

modules:
  # שינוי השם והגרסה המוצגים במערכת
  - type: os-release
    properties:
      name: "Roseite"
      pretty-name: "Roseite"
      version: "0.2-Alpha"

  - type: script
    scripts:
      - add-repos.sh

  - type: rpm-ostree
    install:
      - onlyoffice-desktopeditors
      - https://github.com/digimezzo/dopamine/releases/download/v3.0.2/Dopamine-3.0.2.rpm
    remove:
      # דפדפנים וטרמינל (כולל חבילות השפה)
      - firefox
      - firefox-langpacks
      
      # רשת וקישוריות (כולל כל הפלאגינים והשירותים)


  - type: script
    scripts:
      - set-defaults.sh
      - install-zayit.sh
      - hermetic-lock.sh

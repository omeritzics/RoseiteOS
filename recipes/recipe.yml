# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: roseiteos
description: RoseiteOS - A completely hermetic, terminal-free, secure study system.
base-image: ghcr.io/ublue-os/kinoite-main
image-version: 43

modules:
  # שינוי השם והגרסה המוצגים במערכת
  - type: os-release
    properties:
      name: "RoseiteOS"
      pretty-name: "RoseiteOS"
      version: "0.1"

  - type: script
    scripts:
      - add-repos.sh

  - type: rpm-ostree
    install:
      - onlyoffice-desktopeditors
      - sayonara
    remove:
      # דפדפנים וטרמינל (כולל חבילות השפה)
      - firefox
      - firefox-langpacks
      - konsole
      
      # רשת וקישוריות (כולל כל הפלאגינים והשירותים)
      - plasma-nm
      - plasma-nm-vpnc
      - plasma-nm-openvpn
      - plasma-nm-openconnect
      - kde-connect
      - kde-connect-libs
      - kdeconnectd
      - krfb
      - krfb-libs
      
      # כלי מערכת (כולל פלאגינים והתראות)
      - plasma-discover
      - plasma-discover-notifier
      - plasma-discover-kns
      - plasma-discover-flatpak
      - kate
      - kate-plugins
      - kate-krunner-plugin
      - kwrite
      - firewall-config
      - kwalletmanager5
      - khelpcenter
      - plasma-welcome
      - kdebugsettings
      - kernel-modules-extra
      
      # מנועי קלט (הסרה מוחלטת של סביבת fcitx לפי הטרמינל המקומי)
      - fcitx5
      - fcitx5-libs
      - fcitx5-qt-libfcitx5qt6widgets
      - fcitx5-qt6
      - fcitx5-qt-qt6gui
      - fcitx5-gtk
      - fcitx5-gtk4
      - fcitx5-gtk3
      - fcitx5-qt-libfcitx5qtdbus
      - fcitx5-qt5
      - fcitx5-data
      - fcitx5-lua
      - fcitx5-chinese-addons
      - fcitx5-chinese-addons-data
      - fcitx5-m17n
      - fcitx5-mozc
      - fcitx5-chewing
      - fcitx5-hangul
      - fcitx5-libthai
      - fcitx5-sayura
      - fcitx5-unikey
      - fcitx5-qt
      - fcitx5-configtool
      - kcm-fcitx5
      - libime
      - libime-data

  # התקנת Obsidian כ-Flatpak בצורה מובנית
  - type: default-flatpaks
    system:
      repo-url: https://dl.flathub.org/repo/flathub.flatpakrepo
      repo-name: flathub
      install:
        - md.obsidian.Obsidian

  - type: script
    scripts:
      - set-defaults.sh # סקריפט המקלדת שהוספנו
      - install-zayit.sh
      - hermetic-lock.sh
      - create-shortcut.sh

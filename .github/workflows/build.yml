name: Build Torah OS
on:
  workflow_dispatch: # הפעלה ידנית בלשונית Actions
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write # נדרש כדי להעלות את התמונה ל-GitHub

jobs:
  build-image:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.generate_tag.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static

      - name: Download Vib
        run: |
          curl -L https://github.com/Vanilla-OS/vib/releases/latest/download/vib-linux-amd64 -o vib
          chmod +x vib

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push OCI Image
        run: |
          # בניית התמונה והעלאתה ל-GitHub Packages
          sudo ./vib build recipe.yml --tag ghcr.io/${{ github.repository_owner }}/torah-os:latest --push

  build-iso:
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build ISO
        uses: Vanilla-OS/iso-constructor@main
        with:
          image: ghcr.io/${{ github.repository_owner }}/torah-os:latest
          # כאן המערכת הופכת את התמונה שבנינו לקובץ ISO

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: Torah-OS-ISO
          path: ./*.iso
